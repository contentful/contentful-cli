name: fork-ci
permissions:
  contents: read

on:
  pull_request:
    branches: ['**']

jobs:
  build:
    if: github.event.pull_request.head.repo.fork == true
    uses: ./.github/workflows/build.yaml

  check:
    needs: build
    uses: ./.github/workflows/check.yaml
    with:
      environment: fork-ci

  e2e-tests:
    needs: [build, check]
    uses: ./.github/workflows/test-e2e.yaml
    with:
      environment: fork-ci
